# ------------------------------------------------------------
# GitHub Actions – OBenchmark Cross Platform Build
# Linux / macOS / Windows
# Avec sccache + dépendances Linux + artefacts
# ------------------------------------------------------------

name: OBenchmark – Cross Platform Build

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

env:
  BINARY_NAME: obenchmark
  SCCACHE_GHA_ENABLED: "true"

jobs:

  # ==========================================================
  # 🐧 Linux
  # ==========================================================
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Dépendances pour winit / wgpu / X11 / Wayland
      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libx11-dev libxrandr-dev libxi-dev libxcursor-dev libxinerama-dev \
            libwayland-dev libxkbcommon-dev \
            libudev-dev \
            libvulkan-dev

      # Rust toolchain
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # sccache (accélère la compilation Rust)
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.5

      # Cache Cargo registry
      - name: Cache Cargo (registry + git)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: linux-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: linux-cargo-

      # Cache target
      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: linux-target-${{ hashFiles('Cargo.lock') }}
          restore-keys: linux-target-

      # Build
      - name: Build release
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_GHA_ENABLED: "false"
        run: cargo build --release

      - name: Archive binary
        run: |
          tar -czvf ${{ env.BINARY_NAME }}-linux.tar.gz \
          -C target/release ${{ env.BINARY_NAME }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-linux
          path: ${{ env.BINARY_NAME }}-linux.tar.gz
          retention-days: 30


  # ==========================================================
  # 🍎 macOS
  # ==========================================================
  build-macos:
    name: Build (macOS)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.5

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: macos-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: macos-cargo-

      - name: Cache target
        uses: actions/cache@v4
        with:
          path: target
          key: macos-target-${{ hashFiles('Cargo.lock') }}
          restore-keys: macos-target-

      - name: Build release
        env:
          RUSTC_WRAPPER: sccache
        run: cargo build --release

      - name: Archive binary
        run: |
          tar -czvf ${{ env.BINARY_NAME }}-macos.tar.gz \
          -C target/release ${{ env.BINARY_NAME }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-macos
          path: ${{ env.BINARY_NAME }}-macos.tar.gz
          retention-days: 30


  # ==========================================================
  # 🪟 Windows
  # ==========================================================
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.5

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
          key: windows-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Cache target
        uses: actions/cache@v4
        with:
          path: target
          key: windows-target-${{ hashFiles('Cargo.lock') }}
          restore-keys: windows-target-

      - name: Build release
        env:
          RUSTC_WRAPPER: sccache
        run: cargo build --release

      - name: Archive binary
        run: |
          Compress-Archive `
            -Path target\release\${{ env.BINARY_NAME }}.exe `
            -DestinationPath ${{ env.BINARY_NAME }}-windows.zip
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-windows
          path: ${{ env.BINARY_NAME }}-windows.zip
          retention-days: 30
